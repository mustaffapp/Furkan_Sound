<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Furkan Sound</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="3S_logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FC8C2A">
    <style>
        @font-face { font-family: 'Fsound_font'; src: url('Fsound_font.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }
        * { box-sizing: border-box; }
        :root { --theme: #FC8C2A; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --sub: #98989d; --border: #333333; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; display: flex; justify-content: center; height: 100vh; overflow: hidden; background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('note_bg.jpg'); background-size: cover; background-position: center; }
        #app { width: 100%; max-width: 440px; background: rgba(0,0,0,0.6); position: relative; height: 100%; overflow: hidden; }
        
        .page { display: flex; flex-direction: column; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: rgba(0,0,0,0.9); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        .page.active { transform: translateX(0); }
        #dashboard.active { transform: translateX(0); }
        #dashboard:not(.active) { transform: translateX(-100%); }

        .header-standard { padding: 20px 24px; display: grid; grid-template-columns: 1fr 50px; align-items: center; height: 160px; z-index: 101; }
        .logo-img { height: 100px; width: auto; object-fit: contain; margin-top: 16px; }
        .header-right-stack { display: flex; flex-direction: column; gap: 20px; align-items: flex-end; margin-top: 32px;}
        
        .header-page-title { display: grid; grid-template-columns: 50px 1fr; align-items: center; padding: 20px 24px; height: 160px; z-index: 101; }
        .page-title-text { font-family: 'Fsound_font', sans-serif; font-weight: 700; font-size: 24px; letter-spacing: 1px; text-align: right; padding-right: 20%; }
        
        .icon-btn { border: none; background: transparent; display: flex; align-items: center; cursor: pointer; padding: 0; }
        .icon-btn img { width: 30px; height: 30px; transition: 0.3s; }
        
        .vertical-stack { display: flex; flex-direction: column; gap: 16px; padding: 10px 24px; }
        .box { background: rgba(28, 28, 30, 0.8); border-radius: 20px; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; border: 2px solid transparent; cursor: pointer; transition: 0.2s; position: relative; height: 90px; }
        .box.active { border-color: var(--theme); }
        .box.locked { opacity: 0.8; cursor: wait; pointer-events: none; }
        .box.offline-mode { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        
        .box-left { display: flex; align-items: center; gap: 22px; }
        .device-icon { width: 44px; height: 44px; object-fit: contain; transition: 0.3s; }
        .box-info { display: flex; flex-direction: column; }
        .box-info div:first-child { font-size: 20px; font-weight: 700; }
        .box-info div:last-child { font-size: 10px; opacity: 0.6; margin-top: 2px; }
        
        .box-right { display: flex; align-items: center; }
        .toggle-switch { position: relative; width: 50px; height: 30px; background: #3a3a3c; border-radius: 15px; transition: 0.3s; }
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px; background: white; border-radius: 50%; transition: 0.3s; }
        .box.active .toggle-switch { background: var(--theme); }
        .box.active .toggle-switch::after { transform: translateX(20px); }
        .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid var(--theme); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .box.locked .spinner { display: block; }
        .box.locked .toggle-switch { display: none; }
        
        .settings-group { margin: 20px 24px; }
        .settings-card { background: rgba(28, 28, 30, 0.3); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; padding: 25px; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; justify-items: center; }
        .color-swatch { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 3px solid rgba(255,255,255,0.1); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .color-swatch.selected { border-color: #ffffff; transform: scale(1.2); box-shadow: 0 0 15px var(--theme); }
        
        .action-btn { width: 100%; background: rgba(28, 28, 30, 0.8); border: 2px solid var(--theme); color: var(--theme); border-radius: 12px; height: 50px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        #statusText { font-size: 14px; margin-top: 20px; color: #8e8e93; -webkit-text-stroke: 0.1px white; line-height: 1.4; }
        .footer-status { margin-top: auto; padding: 30px 24px; text-align: center; }
        .conn-status-text { font-size: 11px; font-weight: 800; letter-spacing: 1px; }
        .conn-status-text.online { color: var(--theme); }
        .conn-status-text.offline { color: #8e8e93; -webkit-text-stroke: 0.1px white; }
    </style>
</head>
<body>
    <div id="app">
        <div id="dashboard" class="page active">
            <div class="header-standard">
                <img src="Logo.png" class="logo-img" alt="Logo">
                <div class="header-right-stack">
                    <div class="icon-btn" onclick="openPage('settings')"><img src="settings_icon.png"></div>
                    <div class="icon-btn" onclick="openPage('connStatus')"><img id="wifiHeaderIcon" src="con_icon.png"></div>
                </div>
            </div>
            <div class="vertical-stack" id="mainGrid"></div>
            <div class="footer-status">
                <div id="dashboardConnStatus" class="conn-status-text"></div>
            </div>
        </div>

        <div id="settings" class="page">
            <div class="header-page-title">
                <div class="icon-btn" onclick="openPage('dashboard')"><img src="back_icon.png"></div>
                <div class="page-title-text">Ayarlar</div>
            </div>
            <div class="settings-group">
                <div style="margin-bottom:15px; margin-left:5px; font-weight: 700; color: var(--sub); font-size: 12px; letter-spacing: 1.5px;">Tema Rengi</div>
                <div class="settings-card" id="themePalette"></div>
            </div>
        </div>

        <div id="connStatus" class="page">
            <div class="header-page-title">
                <div class="icon-btn" onclick="openPage('dashboard')"><img src="back_icon.png"></div>
                <div class="page-title-text">Bağlantı</div>
            </div>
            <div style="padding:0 24px; text-align: center; flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                <div style="margin-bottom: 20px;"><img src="con_icon.png" style="width:100px; transition: 0.3s;" id="bigConnIcon"></div>
                <div style="width:100%; max-width:280px;">
                    <button class="action-btn" id="connectButton" onclick="handlePlatformConnection()">BAĞLAN</button>
                    <div id="statusText"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const palette = ['#FC8C2A', '#FF0000', '#8B0000', '#FFBF00', '#CC5500', '#FFFF00', '#90EE90', '#006400', '#ADD8E6', '#0000FF', '#FF1493', '#800080'];
        const ESP_IP = "http://192.168.4.1";
        const BLE_SERVICE_UUID = "91bad492-b950-4226-aa2b-4ede9fa42f59";
        const BLE_CHAR_UUID = "cba1d466-344c-4be3-ab31-107015375cdd";
        let isConnected = false, isWaiting = false, activeTargetId = null;
        let connectionMode = null; 
        let isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        let bleDevice = null, bleCharacteristic = null;
        let isModLocked = false, isModActive = false;

        let config = [
            {id:0, name:"Pandizot", on:"1", off:"2", state:false, icon:"speaker_icon.png"},
            {id:1, name:"LED", on:"3", off:"4", state:false, icon:"light_icon.png"},
            {id:2, name:"Sistem", on:"5", off:"6", state:false, icon:"system_icon.png"}
        ];

        function render() {
            const grid = document.getElementById('mainGrid');
            const dashStatus = document.getElementById('dashboardConnStatus');
            dashStatus.innerText = isConnected ? (isIOS ? "BAĞLI (WIFI)" : "BAĞLI (BLUETOOTH)") : "BAĞLI DEĞİL";
            dashStatus.className = "conn-status-text " + (isConnected ? "online" : "offline");
            
            grid.innerHTML = config.map(s => {
                let isThisLocked = isWaiting && (s.id === activeTargetId || (activeTargetId === 2 && (s.id === 0 || s.id === 1)));
                let offlineClass = !isConnected ? 'offline-mode' : '';
                return `
                <div class="box ${s.state ? 'active' : ''} ${isThisLocked ? 'locked' : ''} ${offlineClass}" onclick="toggleSwitch(${s.id})">
                    <div class="box-left">
                        <img src="${s.icon}" class="device-icon">
                        <div class="box-info"><div>${s.name}</div><div>${!isConnected ? '        ' : (s.state ? 'AÇIK' : 'KAPALI')}</div></div>
                    </div>
                    <div class="box-right"><div class="toggle-switch"></div><div class="spinner"></div></div>
                </div>`;
            }).join('') + `
            <div class="box ${isModActive ? 'active' : ''} ${!isConnected ? 'offline-mode' : ''}" onclick="sendModCommand()">
                <div class="box-left">
                    <img src="mod_icon.png" class="device-icon">
                    <div class="box-info"><div>Mod</div><div>${!isConnected ? '        ' : (isModActive ? 'AKTİF' : 'BEKLİYOR')}</div></div>
                </div>
            </div>`;
            renderSettings(); updateHeaderIcons();
        }

        function renderSettings() {
            const paletteEl = document.getElementById('themePalette');
            const currentTheme = localStorage.getItem('theme') || '#FC8C2A';
            paletteEl.innerHTML = `<div class="color-grid">${palette.map(c => `<div class="color-swatch ${c.toLowerCase() === currentTheme.toLowerCase() ? 'selected' : ''}" style="background-color: ${c}" onclick="applyTheme('${c}')"></div>`).join('')}</div>`;
        }

        function applyTheme(c) { localStorage.setItem('theme', c); document.documentElement.style.setProperty('--theme', c); renderSettings(); }

        function updateHeaderIcons() { 
            const wifiIcon = document.getElementById('wifiHeaderIcon');
            const bigIcon = document.getElementById('bigConnIcon');
            if (wifiIcon) wifiIcon.style.filter = isConnected ? "drop-shadow(0 0 5px #ffffff)" : "grayscale(1)";
            if(bigIcon) bigIcon.style.filter = isConnected ? "drop-shadow(0 0 15px #ffffff)" : "none";
        }

        function openPage(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }

        async function handlePlatformConnection() { isIOS ? await checkWifiConnection() : await connectBluetooth(); }

        async function checkWifiConnection() {
            connectionMode = 'WIFI';
            const st = document.getElementById('statusText');
            try {
                const controller = new AbortController(); setTimeout(() => controller.abort(), 2000);
                const response = await fetch(`${ESP_IP}/status`, { signal: controller.signal });
                const data = await response.json();
                isConnected = true; config[0].state = data.lid; config[1].state = data.light;
                st.innerText = "Bağlantı Doğrulandı."; st.style.color = "white";
            } catch (e) { isConnected = false; st.innerText = "Bağlantı Kurulamadı"; st.style.color = "#ff453a"; }
            render();
        }

        async function connectBluetooth() {
            connectionMode = 'BLE';
            const st = document.getElementById('statusText');
            try {
                bleDevice = await navigator.bluetooth.requestDevice({ filters: [{ name: 'Furkan Sound' }], optionalServices: [BLE_SERVICE_UUID] });
                bleDevice.addEventListener('gattserverdisconnected', onBleDisconnected);
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(BLE_SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(BLE_CHAR_UUID);
                await bleCharacteristic.startNotifications();
                bleCharacteristic.addEventListener('characteristicvaluechanged', handleBleNotification);
                isConnected = true; st.innerText = "Bağlandı."; st.style.color = "white"; localStorage.setItem('ble_paired', 'true');
            } catch (e) {
                if (!(e.name === 'NotFoundError' || e.message.includes('User cancelled'))) {
                    isConnected = false; st.innerText = "Bağlantı Kurulamadı"; st.style.color = "#ff453a";
                }
            }
            render();
        }

        function handleBleNotification(event) {
            if (connectionMode !== 'BLE') return;
            try {
                let data = JSON.parse(new TextDecoder().decode(event.target.value));
                config[0].state = data.lid; config[1].state = data.light; render();
            } catch(e) { }
        }

        function onBleDisconnected() { isConnected = false; bleCharacteristic = null; bleDevice = null; render(); autoReconnectBluetooth(); }

        async function autoReconnectBluetooth() {
            if (isIOS || isConnected || !localStorage.getItem('ble_paired')) return;
            try {
                let devices = await navigator.bluetooth.getDevices();
                let target = devices.find(d => d.name === 'Furkan Sound');
                if (target) {
                    connectionMode = 'BLE';
                    bleDevice = target; bleDevice.addEventListener('gattserverdisconnected', onBleDisconnected);
                    const server = await bleDevice.gatt.connect();
                    const service = await server.getPrimaryService(BLE_SERVICE_UUID);
                    bleCharacteristic = await service.getCharacteristic(BLE_CHAR_UUID);
                    await bleCharacteristic.startNotifications();
                    bleCharacteristic.addEventListener('characteristicvaluechanged', handleBleNotification);
                    isConnected = true; render();
                }
            } catch(e) { }
        }

        async function toggleSwitch(id) {
            if (isWaiting || !isConnected) return;
            activeTargetId = id; isWaiting = true; render();
            const cmd = config[id].state ? config[id].off : config[id].on;
            try {
                if (connectionMode === 'WIFI') { 
                    await fetch(`${ESP_IP}/komut?val=${cmd}`, { mode: 'no-cors' }); 
                    await checkWifiConnection(); 
                } else if (connectionMode === 'BLE' && bleCharacteristic) {
                    await bleCharacteristic.writeValue(new TextEncoder().encode(cmd));
                    if (id === 0) config[0].state = !config[0].state;
                    if (id === 1) config[1].state = !config[1].state;
                    if (id === 2) { let targetState = !config[2].state; config[0].state = targetState; config[1].state = targetState; }
                }
            } catch (e) { }
            isWaiting = false; activeTargetId = null; render();
        }

        async function sendModCommand() {
            if (isModLocked || !isConnected) return;
            isModLocked = true; isModActive = true; render();
            try {
                if (connectionMode === 'WIFI') await fetch(`${ESP_IP}/komut?val=7`, { mode: 'no-cors' });
                else if (connectionMode === 'BLE' && bleCharacteristic) await bleCharacteristic.writeValue(new TextEncoder().encode("7"));
            } catch (e) { }
            setTimeout(() => { isModActive = false; isModLocked = false; render(); }, 1000);
        }

        window.onload = () => { 
            const savedColor = localStorage.getItem('theme') || '#FC8C2A';
            document.documentElement.style.setProperty('--theme', savedColor);
            isIOS ? checkWifiConnection() : (autoReconnectBluetooth(), render());
        };
    </script>
</body>
</html>
